name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Test
        run: cargo test

  no-default-features:
    name: Test without default features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test hdf5-reader no defaults
        run: cargo test -p hdf5-reader --no-default-features

      - name: Test netcdf-reader no defaults
        run: cargo test -p netcdf-reader --no-default-features

  fixtures:
    name: Integration tests with fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install 'h5py<3.16' netCDF4 numpy

      - name: Generate fixtures
        run: python testdata/generate_fixtures.py

      - name: Test with fixtures
        run: cargo test

  bench-regression:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/bench-regression
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev libnetcdf-dev

      - name: Install critcmp
        run: cargo install critcmp

      - name: Generate fixtures for benchmarks
        run: |
          pip install 'h5py<3.16' netCDF4 numpy
          python testdata/generate_fixtures.py

      - name: Checkout base and run baseline benchmarks
        run: |
          git worktree add ../base origin/${{ github.base_ref }}
          cd ../base
          python testdata/generate_fixtures.py
          cargo bench -p netcdf-reader --bench compare_georust -- --save-baseline base

      - name: Run PR benchmarks
        run: cargo bench -p netcdf-reader --bench compare_georust -- --save-baseline pr

      - name: Compare (fail on >10% regression)
        run: |
          echo "Benchmark deltas >=10%:"
          critcmp base pr --target-dir "$CARGO_TARGET_DIR" --threshold 10 || true

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          threshold = 1.10
          target = Path(os.environ["CARGO_TARGET_DIR"]) / "criterion"
          base_files = sorted(target.glob("**/base/estimates.json"))
          if not base_files:
              print(f"No base benchmark estimates found under {target}", file=sys.stderr)
              sys.exit(1)

          regressions = []
          missing_pr = []

          for base_file in base_files:
              bench_dir = base_file.parent.parent
              pr_file = bench_dir / "pr" / "estimates.json"
              if not pr_file.exists():
                  missing_pr.append(bench_dir.relative_to(target).as_posix())
                  continue

              with base_file.open() as fh:
                  base_mean = json.load(fh)["mean"]["point_estimate"]
              with pr_file.open() as fh:
                  pr_mean = json.load(fh)["mean"]["point_estimate"]

              if base_mean <= 0 or pr_mean <= 0:
                  continue

              ratio = pr_mean / base_mean
              if ratio > threshold:
                  regressions.append(
                      (ratio, bench_dir.relative_to(target).as_posix(), base_mean, pr_mean)
                  )

          if missing_pr:
              print("Missing PR benchmark estimates for:", file=sys.stderr)
              for name in missing_pr:
                  print(f"  {name}", file=sys.stderr)
              sys.exit(1)

          def fmt_ns(value: float) -> str:
              for unit, scale in (("s", 1e9), ("ms", 1e6), ("us", 1e3)):
                  if value >= scale:
                      return f"{value / scale:.1f}{unit}"
              return f"{value:.1f}ns"

          if regressions:
              print("Benchmark regressions >10% (PR mean / base mean):", file=sys.stderr)
              for ratio, name, base_mean, pr_mean in sorted(regressions, reverse=True):
                  print(
                      f"  {name:70} {ratio:5.2f}x  "
                      f"base={fmt_ns(base_mean):>8}  pr={fmt_ns(pr_mean):>8}",
                      file=sys.stderr,
                  )
              sys.exit(1)

          print("No benchmark regressions >10% detected.")
          PY
